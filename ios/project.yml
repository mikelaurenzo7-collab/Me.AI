name: MeAI
options:
  bundleIdPrefix: com.meai
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  MeAI:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/MeAI.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meai.app
        INFOPLIST_FILE: Config/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: MeAIWidgets
        embed: true

  MeAIWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Sources/LiveCallAttributes.swift
    info:
      path: Config/Widgets-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meai.app.widgets
        INFOPLIST_FILE: Config/Widgets-Info.plist
        CODE_SIGN_STYLE: Automatic
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
    dependencies: []
