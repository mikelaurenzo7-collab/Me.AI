name: MeAI
options:
  bundleIdPrefix: com.meai
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  MeAI:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/MeAI.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meai.app
        INFOPLIST_FILE: Config/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: MeAIWidget
        embed: true
  MeAIWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
    info:
      path: Config/MeAIWidget.Info.plist
    entitlements:
      path: Config/MeAIWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meai.app.widget
        INFOPLIST_FILE: Config/MeAIWidget.Info.plist
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
